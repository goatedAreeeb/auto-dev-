version: "1.0"
name: "auto-sre"
description: "An OpenEnv-compliant environment for evaluating AI SRE agents on Linux infrastructure repair tasks."

entry_point: "app.main:app"

author: "Auto-SRE Team"
license: "MIT"
url: "https://huggingface.co/spaces/goated1/auto-sre"

tasks:
  - id: "t1_config"
    grader: "grader.health_check:ConfigGrader"
    name: "Config File Repair"
    description: "The system configuration file is misnamed. The agent must rename conf.bak to conf."
    difficulty: "easy"
  - id: "t2_port"
    grader: "grader.health_check:PortGrader"
    name: "Rogue Process Port Occupation"
    description: "Port 8080 is blocked by a stray background process. The agent must identify and kill the rogue PID."
    difficulty: "medium"
  - id: "t3_dep"
    grader: "grader.health_check:DependencyGrader"
    name: "Missing Application Dependencies"
    description: "The target Node.js application fails to boot due to missing NPM packages. The agent must execute `npm install`."
    difficulty: "hard"
  - id: "t4_trap"
    grader: "grader.health_check:TrapGrader"
    name: "Healthy System Trap"
    description: "A system report suggests a failure, but the system may already be healthy. Verify before taking action."
    difficulty: "hard"

observation_space: "DevOpsObservation"
action_space: "DevOpsAction"
reward_space: "Reward"

endpoints:
  health: /healthz
  reset:  /reset
  step:   /step
  state:  /state
  grade:  /grader

scoring:
  reward_range: [0.01, 0.99]
  success_threshold: 0.98
  score_formula: mean(step_rewards)
