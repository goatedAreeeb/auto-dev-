version: "1.0"
name: "auto-sre"
description: "An OpenEnv-compliant environment for evaluating AI SRE agents on Linux infrastructure repair tasks."

entry_point: "app.main:app"

author: "Auto-SRE Team"
license: "MIT"
url: "https://huggingface.co/spaces/goated1/auto-sre"

tasks:
  - id: "t1_config"
    grader: "grader.health_check:ConfigGrader"
    name: "Config File Repair"
    description: "Misnamed config. Rename conf.bak to conf. Restart app."
    difficulty: "easy"
  - id: "t2_port"
    grader: "grader.health_check:PortGrader"
    name: "Rogue Process Port Occupation"
    description: "Randomized port blocked by rogue process. Find PID, kill, verify."
    difficulty: "easy"
  - id: "t3_dep"
    grader: "grader.health_check:DependencyGrader"
    name: "Missing Application Dependencies"
    description: "Node.js app fails — missing npm packages. Inspect, install, verify."
    difficulty: "easy"
  - id: "t4_trap"
    grader: "grader.health_check:TrapGrader"
    name: "Healthy System Trap"
    description: "Report suggests failure but system is healthy. Diagnose and abstain."
    difficulty: "medium"
  - id: "t5_disk_full"
    grader: "grader.health_check:DiskGrader"
    name: "Disk Full — Log Overflow"
    description: "Disk at 100% from massive log file. Detect, locate, delete."
    difficulty: "medium"
  - id: "t6_oom_killer"
    grader: "grader.health_check:OOMGrader"
    name: "OOM Killer — Rogue Memory Hog"
    description: "Rogue process leaking memory. Detect, identify PID, kill."
    difficulty: "medium"
  - id: "t7_cascading_meltdown"
    grader: "grader.health_check:CascadeGrader"
    name: "Cascading Meltdown"
    description: "Rogue logger floods disk causing DB crash. 4-step ordered fix required."
    difficulty: "hard"
  - id: "t8_memory_leak_loop"
    grader: "grader.health_check:MemLeakGrader"
    name: "Memory Leak Restart Loop"
    description: "Service in crash-restart loop due to memory leak. Kill, stabilize, restore."
    difficulty: "hard"
  - id: "t9_dependency_chain_failure"
    grader: "grader.health_check:DepChainGrader"
    name: "Dependency Chain Failure"
    description: "App down — db to cache to app chain broken. Restart in correct dependency order."
    difficulty: "hard"
  - id: "t10_config_secret_failure"
    grader: "grader.health_check:SecretGrader"
    name: "Config Secret Failure"
    description: "App auth fails — wrong DB secret. Inspect, fix secret file, restart."
    difficulty: "hard"

observation_space: "DevOpsObservation"
action_space: "DevOpsAction"
reward_space: "Reward"

endpoints:
  health: /healthz
  reset:  /reset
  step:   /step
  state:  /state
  grade:  /grader

scoring:
  reward_range: [0.01, 0.989]
  success_threshold: 0.95
  score_formula: mean(step_rewards)
